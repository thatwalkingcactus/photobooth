<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Photobooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #9b6dff;
    --purple-dark: #7c4dff;
    --purple-soft: #f0e9ff;
    --green: #4ecb8d;
    --green-dark: #2f9e68;
    --green-soft: #e5f9ef;
    --text-dark: #3a2e4d;
    --text-soft: #8577a3;
  }

  body {
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(160deg, #f6f1ff 0%, #eafaf1 100%);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 60px;
  }

  h1 {
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--purple-dark), var(--green-dark));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle { color: var(--text-soft); font-size: 14px; margin-bottom: 6px; font-weight: 500; }

  .dedication {
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--text-soft);
    margin-bottom: 26px;
    opacity: 0.8;
  }

  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 360px;
    background: #fff;
    padding: 28px;
    border-radius: 24px;
    box-shadow: 0 8px 30px rgba(155, 109, 255, 0.15);
  }

  input[type="text"] {
    width: 100%;
    padding: 13px 18px;
    border: 2px solid var(--purple-soft);
    border-radius: 16px;
    background: #fdfcff;
    font-size: 16px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 500;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: var(--purple); }

  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--purple), var(--purple-dark));
    color: white;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Quicksand', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(155, 109, 255, 0.35);
  }

  button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(155, 109, 255, 0.45); }
  button:disabled { background: #d8d2e8; cursor: not-allowed; box-shadow: none; }

  .hint { font-size: 13px; color: var(--text-soft); text-align: center; font-weight: 500; }

  /* Gallery */
  .gallery-section {
    width: 100%;
    max-width: 760px;
    margin-top: 36px;
  }

  .gallery-section h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 8px;
    text-align: center;
  }

  .gallery-bulk {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .gallery-bulk button, .gallery-bulk label {
    width: auto;
    padding: 9px 20px;
    font-size: 13px;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 700;
    font-family: 'Quicksand', sans-serif;
    box-shadow: none;
  }

  #export-btn { background: var(--green-soft); color: var(--green-dark); border: none; }
  #export-btn:hover { transform: translateY(-1px); background: #c5f5df; box-shadow: none; }

  .import-label {
    background: var(--purple-soft);
    color: var(--purple-dark);
    border: none;
    display: inline-block;
    padding: 9px 20px;
    font-size: 13px;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 700;
    font-family: 'Quicksand', sans-serif;
    transition: transform 0.15s;
  }

  .import-label:hover { transform: translateY(-1px); }

  #import-input { display: none; }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
  }

  .gallery-card {
    background: #fff;
    border-radius: 16px;
    padding: 10px;
    box-shadow: 0 4px 16px rgba(155,109,255,0.12);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .gallery-card img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: 8px;
    background: var(--purple-soft);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .gallery-card img:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 16px rgba(155,109,255,0.25);
  }

  .gallery-date { font-size: 11px; color: var(--text-soft); font-weight: 600; text-align: center; }

  .gallery-actions { display: flex; gap: 8px; width: 100%; }

  .gallery-actions button, .gallery-actions a {
    flex: 1;
    width: auto;
    padding: 8px;
    font-size: 11px;
    border-radius: 999px;
    text-align: center;
    text-decoration: none;
    font-weight: 700;
    font-family: 'Quicksand', sans-serif;
    cursor: pointer;
    border: none;
    box-shadow: none;
    transition: transform 0.1s;
  }

  .gallery-download { background: var(--green-soft); color: var(--green-dark); }
  .gallery-delete { background: #fde7ea; color: #c2455a; }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30, 20, 50, 0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  }

  #lightbox-close {
    position: absolute;
    top: 18px;
    right: 22px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 28px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: none;
    padding: 0;
    line-height: 1;
  }

  #lightbox-close:hover { background: rgba(255,255,255,0.25); transform: none; box-shadow: none; }

  /* Main app */
  #main-app { display: none; width: 100%; max-width: 780px; }

  .status-bar {
    text-align: center;
    margin-bottom: 6px;
    font-size: 14px;
    color: var(--text-soft);
    font-weight: 600;
  }

  .status-bar strong { color: var(--purple-dark); }

  .big-countdown {
    display: none;
    text-align: center;
    font-size: 84px;
    font-weight: 700;
    color: var(--purple-dark);
    margin: 4px 0 14px;
    line-height: 1;
  }

  .big-countdown.visible { display: block; animation: pulse 1s ease-in-out; }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    35% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .voice-controls { text-align: center; margin-bottom: 14px; }

  #mic-btn {
    width: auto;
    display: inline-block;
    padding: 8px 20px;
    font-size: 13px;
    background: #fff;
    color: var(--purple-dark);
    border: 2px solid var(--purple-soft);
    box-shadow: none;
  }

  #mic-btn:hover { transform: none; box-shadow: none; background: var(--purple-soft); }

  .cameras {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .cam-box {
    position: relative;
    background: var(--purple-soft);
    border-radius: 20px;
    overflow: hidden;
    aspect-ratio: 3/4;
    border: 3px solid #fff;
    box-shadow: 0 6px 20px rgba(155, 109, 255, 0.18);
  }

  .cam-box video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .cam-label {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(58, 46, 77, 0.55);
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .countdown-pill {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(124, 77, 255, 0.85);
    color: white;
    font-size: 22px;
    font-weight: 700;
    padding: 4px 13px;
    border-radius: 999px;
    display: none;
    font-family: 'Quicksand', sans-serif;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }

  .countdown-pill.visible { display: block; animation: pulse 1s ease-in-out; }

  .thumb-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }

  .thumb {
    background: var(--green-soft);
    border-radius: 12px;
    aspect-ratio: 3/2;
    overflow: hidden;
    position: relative;
    border: 2px solid transparent;
  }

  .thumb.active-slot { border-color: var(--purple); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .thumb .slot-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #b3a8d1;
  }

  .retake-btn {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(58, 46, 77, 0.6);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    width: auto;
    font-family: 'Quicksand', sans-serif;
    box-shadow: none;
  }

  .controls { text-align: center; }
  #start-btn { max-width: 260px; margin: 0 auto; display: block; }

  #strip-editor { display: none; max-width: 520px; margin: 0 auto; }

  .strip-options {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 20px;
    background: #fff;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(155, 109, 255, 0.12);
  }

  .strip-options label { font-size: 13px; color: var(--text-soft); font-weight: 600; }

  .color-pickers { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 8px; }

  .color-swatch {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }

  .color-swatch.selected { border-color: var(--text-dark); transform: scale(1.15); }

  #caption-input {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 600;
    margin-top: 8px;
  }

  #strip-canvas {
    width: 100%;
    box-shadow: 0 8px 30px rgba(58, 46, 77, 0.18);
    margin-bottom: 16px;
  }

  #download-btn { background: linear-gradient(90deg, var(--green), var(--green-dark)); box-shadow: 0 4px 14px rgba(78, 203, 141, 0.4); }
  #save-gallery-btn { background: linear-gradient(90deg, var(--purple), var(--purple-dark)); margin-top: 10px; }
  #restart-btn {
    background: transparent;
    border: 2px solid var(--purple);
    color: var(--purple-dark);
    margin-top: 10px;
    box-shadow: none;
  }
  #restart-btn:hover { background: var(--purple-soft); }

  /* Gallery on strip page */
  .gallery-section-strip {
    width: 100%;
    max-width: 520px;
    margin: 32px auto 0;
  }

  .version-tag {
    position: fixed;
    bottom: 10px;
    right: 14px;
    font-size: 11px;
    color: var(--text-soft);
    opacity: 0.55;
    font-weight: 600;
    pointer-events: none;
  }
</style>
</head>
<body>

<h1>Our Photobooth</h1>
<p class="subtitle">A little moment, just for us</p>
<p class="dedication">From a loser, dedicated to a dork.</p>

<!-- Landing page -->
<div id="setup-screen">
  <input type="text" id="name-input" placeholder="Your name" />
  <input type="text" id="room-input" placeholder="Room code (share with partner)" value="ourroom" />
  <button id="join-btn">Open the booth</button>
  <p class="hint">Both of you enter the same room code</p>
</div>

<!-- Gallery on landing page -->
<div class="gallery-section" id="landing-gallery">
  <h2>Your saved memories</h2>
  <div class="gallery-bulk">
    <button id="export-btn">Download all (backup)</button>
    <label class="import-label">
      Restore from backup
      <input type="file" id="import-input" accept=".json">
    </label>
  </div>
  <div class="gallery-grid" id="gallery-grid">
    <p class="hint">Loading your memories...</p>
  </div>
</div>

<!-- Main app (booth + strip) -->
<div id="main-app">
  <div class="status-bar" id="status-bar">Waiting for partner...</div>
  <div class="big-countdown" id="big-countdown"></div>

  <div class="voice-controls" id="voice-controls" style="display:none;">
    <button id="mic-btn">Mute mic</button>
  </div>

  <div class="cameras">
    <div class="cam-box">
      <video id="local-video" autoplay muted playsinline></video>
      <div class="countdown-pill" id="local-pill"></div>
      <div class="cam-label" id="local-label">You</div>
    </div>
    <div class="cam-box">
      <video id="remote-video" autoplay playsinline></video>
      <div class="countdown-pill" id="remote-pill"></div>
      <div class="cam-label" id="remote-label">Partner</div>
    </div>
  </div>

  <!-- Booth controls (hidden during strip) -->
  <div id="booth-controls">
    <div class="thumb-row" id="thumb-row">
      <div class="thumb active-slot" id="slot-0"><div class="slot-num">1</div></div>
      <div class="thumb" id="slot-1"><div class="slot-num">2</div></div>
      <div class="thumb" id="slot-2"><div class="slot-num">3</div></div>
      <div class="thumb" id="slot-3"><div class="slot-num">4</div></div>
    </div>
    <div class="controls">
      <button id="start-btn" disabled>Waiting for partner...</button>
    </div>
  </div>

  <!-- Strip editor -->
  <div id="strip-editor">
    <div class="strip-options">
      <div>
        <label>Border color</label>
        <div class="color-pickers" id="color-pickers">
          <div class="color-swatch selected" style="background:#f0e9ff" data-color="#f0e9ff"></div>
          <div class="color-swatch" style="background:#e5f9ef" data-color="#e5f9ef"></div>
          <div class="color-swatch" style="background:#9b6dff" data-color="#9b6dff"></div>
          <div class="color-swatch" style="background:#4ecb8d" data-color="#4ecb8d"></div>
          <div class="color-swatch" style="background:#3a2e4d" data-color="#3a2e4d"></div>
        </div>
      </div>
      <div>
        <label>Caption</label>
        <input type="text" id="caption-input" placeholder="Add a little note..." maxlength="60">
      </div>
    </div>

    <canvas id="strip-canvas"></canvas>

    <button id="download-btn">Download strip</button>
    <button id="save-gallery-btn">Save to our gallery</button>
    <p class="hint" id="save-status"></p>
    <button id="restart-btn">Take new photos</button>

    <!-- Gallery shown at bottom of strip page -->
    <div class="gallery-section-strip" id="strip-gallery">
      <h2>Your saved memories</h2>
      <div class="gallery-grid" id="strip-gallery-grid">
        <p class="hint">Loading...</p>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt="Photostrip fullscreen view">
</div>

<div class="version-tag">v1.7.0</div>

<script>
  const SERVER_URL = 'https://photobooth-apqx.onrender.com'; // keep your existing Render URL here
  const HTTP_URL = SERVER_URL.replace(/^wss:\/\//, 'https://').replace(/^ws:\/\//, 'http://');

  let ws, pc;
  let localStream;
  let myName = '';
  let partnerName = '';
  let myRole = null;
  let currentSlot = 0;
  let photos = [null, null, null, null];
  let remotePhotos = [null, null, null, null];
  let mergedPhotos = [null, null, null, null];
  let sessionDriver = false;
  let clockOffset = 0;
  let activeCountdownInterval = null;
  let pendingChainTimeout = null;
  let borderColor = '#f0e9ff';
  let micOn = true;
  let hasMic = false;

  const ICE_SERVERS = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
    ]
  };

  const setupScreen   = document.getElementById('setup-screen');
  const landingGallery = document.getElementById('landing-gallery');
  const mainApp       = document.getElementById('main-app');
  const boothControls = document.getElementById('booth-controls');
  const stripEditor   = document.getElementById('strip-editor');
  const joinBtn       = document.getElementById('join-btn');
  const startBtn      = document.getElementById('start-btn');
  const micBtn        = document.getElementById('mic-btn');
  const voiceControls = document.getElementById('voice-controls');
  const statusBar     = document.getElementById('status-bar');
  const bigCountdown  = document.getElementById('big-countdown');
  const localVideo    = document.getElementById('local-video');
  const remoteVideo   = document.getElementById('remote-video');
  const localPill     = document.getElementById('local-pill');
  const remotePill    = document.getElementById('remote-pill');
  const localLabel    = document.getElementById('local-label');
  const remoteLabel   = document.getElementById('remote-label');
  const stripCanvas   = document.getElementById('strip-canvas');
  const captionInput  = document.getElementById('caption-input');
  const saveStatus    = document.getElementById('save-status');
  const galleryGrid   = document.getElementById('gallery-grid');
  const stripGalleryGrid = document.getElementById('strip-gallery-grid');
  const lightbox      = document.getElementById('lightbox');
  const lightboxImg   = document.getElementById('lightbox-img');

  function getServerNow() { return Date.now() + clockOffset; }

  function syncClock(rounds = 5) {
    return new Promise((resolve) => {
      let best = null;
      let done = 0;
      function ping() {
        const t0 = Date.now();
        const handler = (e) => {
          let msg;
          try { msg = JSON.parse(e.data); } catch { return; }
          if (msg.type === 'sync_reply' && msg.t0 === t0) {
            ws.removeEventListener('message', handler);
            const t3 = Date.now();
            const rtt = t3 - t0;
            const offset = (msg.serverTime + rtt / 2) - t3;
            if (!best || rtt < best.rtt) best = { rtt, offset };
            done++;
            if (done < rounds) setTimeout(ping, 120);
            else { clockOffset = best.offset; resolve(); }
          }
        };
        ws.addEventListener('message', handler);
        ws.send(JSON.stringify({ type: 'sync', t0 }));
      }
      ping();
    });
  }

  // --- Lightbox ---
  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('open');
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

  // --- Gallery ---
  function galleryCardHTML(s) {
    const date = new Date(s.timestamp).toLocaleString();
    return `
      <div class="gallery-card">
        <img src="${s.dataUrl}" alt="Photostrip from ${date}" onclick="openLightbox('${s.dataUrl}')">
        <div class="gallery-date">${date}</div>
        <div class="gallery-actions">
          <a class="gallery-download" href="${s.dataUrl}" download="photostrip-${s.id}.png">Download</a>
          <button class="gallery-delete" onclick="deleteStrip('${s.id}')">Delete</button>
        </div>
      </div>
    `;
  }

  function loadGallery() {
    const empty = '<p class="hint">Loading your memories...</p>';
    galleryGrid.innerHTML = empty;
    stripGalleryGrid.innerHTML = empty;

    fetch(`${HTTP_URL}/strips`)
      .then(r => r.json())
      .then(strips => {
        if (!strips.length) {
          const msg = '<p class="hint">No saved photostrips yet.</p>';
          galleryGrid.innerHTML = msg;
          stripGalleryGrid.innerHTML = msg;
          return;
        }
        const html = strips.map(galleryCardHTML).join('');
        galleryGrid.innerHTML = html;
        stripGalleryGrid.innerHTML = html;
      })
      .catch(() => {
        const msg = '<p class="hint">Could not load saved photostrips.</p>';
        galleryGrid.innerHTML = msg;
        stripGalleryGrid.innerHTML = msg;
      });
  }

  function deleteStrip(id) {
    fetch(`${HTTP_URL}/strips/${id}`, { method: 'DELETE' }).then(() => loadGallery());
  }

  // --- Bulk export ---
  document.getElementById('export-btn').addEventListener('click', () => {
    const btn = document.getElementById('export-btn');
    btn.textContent = 'Preparing...';
    btn.disabled = true;

    fetch(`${HTTP_URL}/strips/export`)
      .then(r => r.json())
      .then(data => {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `photobooth-backup-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        btn.textContent = 'Download all (backup)';
        btn.disabled = false;
      })
      .catch(() => {
        alert('Export failed. Try again.');
        btn.textContent = 'Download all (backup)';
        btn.disabled = false;
      });
  });

  // --- Bulk import ---
  document.getElementById('import-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.strips || !Array.isArray(data.strips)) {
          alert('Invalid backup file.');
          return;
        }

        const confirmed = confirm(`This will import ${data.strips.length} photostrip(s). Your existing strips will not be deleted. Continue?`);
        if (!confirmed) return;

        const importLabel = document.querySelector('.import-label');
        importLabel.textContent = 'Importing...';

        const res = await fetch(`${HTTP_URL}/strips/import`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ strips: data.strips })
        });

        const result = await res.json();
        importLabel.innerHTML = `Restore from backup <input type="file" id="import-input" accept=".json">`;
        document.getElementById('import-input').addEventListener('change', arguments.callee.bind(null));

        if (result.imported !== undefined) {
          alert(`Successfully imported ${result.imported} photostrip(s)!`);
          loadGallery();
        } else {
          alert('Import failed: ' + (result.error || 'unknown error'));
        }
      } catch {
        alert('Could not read backup file.');
      }
    };
    reader.readAsText(file);
  });

  loadGallery();

  // --- Join ---
  joinBtn.addEventListener('click', async () => {
    myName = document.getElementById('name-input').value.trim() || 'You';
    const room = document.getElementById('room-input').value.trim() || 'ourroom';

    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    } catch (e) {
      alert('Could not access camera. Please allow camera permission.');
      return;
    }

    try {
      const micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      micStream.getAudioTracks().forEach(track => localStream.addTrack(track));
      hasMic = true;
      voiceControls.style.display = 'block';
    } catch {
      hasMic = false;
      voiceControls.style.display = 'none';
    }

    localVideo.srcObject = localStream;
    localLabel.textContent = myName;

    ws = new WebSocket(SERVER_URL);

    ws.onopen = async () => {
      ws.send(JSON.stringify({ type: 'join', room, name: myName }));
      await syncClock();
    };

    ws.onmessage = async (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      await handleMessage(msg);
    };

    ws.onerror = () => alert('Could not connect to server. Is it running?');

    // Hide landing page, show booth
    setupScreen.style.display = 'none';
    landingGallery.style.display = 'none';
    mainApp.style.display = 'block';
    boothControls.style.display = 'block';
    stripEditor.style.display = 'none';
  });

  micBtn.addEventListener('click', () => {
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    micBtn.textContent = micOn ? 'Mute mic' : 'Unmute mic';
  });

  async function handleMessage(msg) {
    switch (msg.type) {
      case 'room_info':
        myRole = msg.role;
        if (msg.count === 2) await bothConnected();
        break;
      case 'partner_joined':
        partnerName = msg.name || 'Partner';
        await bothConnected();
        await createOffer();
        break;
      case 'partner_left':
        statusBar.textContent = 'Partner disconnected. Waiting...';
        startBtn.disabled = true;
        break;
      case 'offer':
        await handleOffer(msg.sdp);
        break;
      case 'answer':
        await pc.setRemoteDescription({ type: 'answer', sdp: msg.sdp });
        break;
      case 'ice':
        if (msg.candidate) await pc.addIceCandidate(msg.candidate);
        break;
      case 'countdown_start':
        startBtn.style.display = 'none';
        runCountdown(msg.startAt, msg.slot, msg.chain !== false);
        break;
      case 'retake_and_start':
        clearSlot(msg.slot);
        startBtn.style.display = 'none';
        runCountdown(msg.startAt, msg.slot, false);
        break;
      case 'remote_photo':
        remotePhotos[msg.slot] = msg.dataUrl;
        checkSlotMerge(msg.slot);
        break;
      case 'strip_update':
        if (msg.field === 'caption') {
          captionInput.value = msg.value;
        } else if (msg.field === 'color') {
          borderColor = msg.value;
          document.querySelectorAll('.color-swatch').forEach(s => {
            s.classList.toggle('selected', s.dataset.color === msg.value);
          });
        }
        renderStrip();
        break;
      case 'restart_session':
        resetSessionState();
        break;
    }
  }

  async function bothConnected() {
    statusBar.innerHTML = `Connected with <strong>${partnerName || 'partner'}</strong> ✓`;
    startBtn.disabled = false;
    startBtn.textContent = 'Start photo session';
    remoteLabel.textContent = partnerName || 'Partner';
  }

  function setupPeerConnection() {
    pc = new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    pc.ontrack = (e) => { remoteVideo.srcObject = e.streams[0]; };
    pc.onicecandidate = (e) => {
      if (e.candidate) ws.send(JSON.stringify({ type: 'ice', candidate: e.candidate }));
    };
  }

  async function createOffer() {
    setupPeerConnection();
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
  }

  async function handleOffer(sdp) {
    setupPeerConnection();
    await pc.setRemoteDescription({ type: 'offer', sdp });
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({ type: 'answer', sdp: answer.sdp }));
  }

  startBtn.addEventListener('click', () => {
    sessionDriver = true;
    startBtn.style.display = 'none';
    triggerCountdown(0, true);
  });

  function triggerCountdown(slot, chained) {
    const startAt = getServerNow() + 10000;
    ws.send(JSON.stringify({ type: 'countdown_start', startAt, slot, chain: chained }));
    runCountdown(startAt, slot, chained);
  }

  function runCountdown(startAt, slot, chained) {
    if (activeCountdownInterval) { clearInterval(activeCountdownInterval); activeCountdownInterval = null; }
    if (pendingChainTimeout) { clearTimeout(pendingChainTimeout); pendingChainTimeout = null; }

    currentSlot = slot;
    updateSlotHighlight();
    localPill.classList.add('visible');
    remotePill.classList.add('visible');

    let lastShown = null;
    activeCountdownInterval = setInterval(() => {
      const remaining = Math.ceil((startAt - getServerNow()) / 1000);

      if (remaining <= 0) {
        clearInterval(activeCountdownInterval);
        activeCountdownInterval = null;
        localPill.classList.remove('visible');
        remotePill.classList.remove('visible');
        bigCountdown.classList.remove('visible');
        capturePhoto(slot, chained);
      } else if (remaining !== lastShown) {
        lastShown = remaining;
        localPill.textContent = remaining;
        remotePill.textContent = remaining;
        [localPill, remotePill].forEach(el => {
          el.classList.remove('visible'); void el.offsetWidth; el.classList.add('visible');
        });
        bigCountdown.textContent = remaining;
        bigCountdown.classList.remove('visible'); void bigCountdown.offsetWidth; bigCountdown.classList.add('visible');
      }
    }, 100);
  }

function capturePhoto(slot, chained) {
  const canvas = document.createElement('canvas');
  // Use the full native camera resolution
  canvas.width = localVideo.videoWidth;
  canvas.height = localVideo.videoHeight;
  canvas.getContext('2d').drawImage(localVideo, 0, 0);
  // PNG capture — lossless, no JPEG artifacts
  const dataUrl = canvas.toDataURL('image/png');

  photos[slot] = dataUrl;
  ws.send(JSON.stringify({ type: 'remote_photo', slot, dataUrl }));
  checkSlotMerge(slot);

  if (sessionDriver && !chained) {
    const nextEmpty = photos.findIndex((p, i) => i > slot && p === null);
    if (nextEmpty !== -1) {
      pendingChainTimeout = setTimeout(() => {
        pendingChainTimeout = null;
        triggerCountdown(nextEmpty, false);
      }, 2000);
    }
    return;
  }

  if (sessionDriver && chained && slot < 3) {
    pendingChainTimeout = setTimeout(() => {
      pendingChainTimeout = null;
      triggerCountdown(slot + 1, true);
    }, 2000);
  }
}

  function clearSlot(slot) {
    photos[slot] = null;
    remotePhotos[slot] = null;
    mergedPhotos[slot] = null;
    document.getElementById(`slot-${slot}`).innerHTML = `<div class="slot-num">${slot + 1}</div>`;
  }

  function retakeSlot(slot) {
    sessionDriver = true;
    if (pendingChainTimeout) { clearTimeout(pendingChainTimeout); pendingChainTimeout = null; }
    clearSlot(slot);
    const startAt = getServerNow() + 10000;
    ws.send(JSON.stringify({ type: 'retake_and_start', slot, startAt }));
    startBtn.style.display = 'none';
    runCountdown(startAt, slot, false);
  }

  function updateSlotHighlight() {
    for (let i = 0; i < 4; i++) {
      document.getElementById(`slot-${i}`).classList.toggle('active-slot', i === currentSlot);
    }
  }

  function checkSlotMerge(slot) {
    if (photos[slot] && remotePhotos[slot]) {
      mergeImages(photos[slot], remotePhotos[slot]).then((url) => {
        mergedPhotos[slot] = url;
        const thumb = document.getElementById(`slot-${slot}`);
        thumb.innerHTML = `<img src="${url}"><button class="retake-btn" onclick="retakeSlot(${slot})">Retake</button>`;
        if (mergedPhotos.every(p => p)) {
          setTimeout(showStrip, 700);
        }
      });
    }
  }

function mergeImages(myDataUrl, theirDataUrl) {
  return new Promise((resolve) => {
    const myImg = new Image();
    const theirImg = new Image();
    let loaded = 0;
    function onLoad() {
      loaded++;
      if (loaded < 2) return;
      // Use the actual captured resolution instead of a fixed small size
      const w = Math.max(myImg.naturalWidth, theirImg.naturalWidth, 720);
      const h = Math.max(myImg.naturalHeight, theirImg.naturalHeight, 960);
      const canvas = document.createElement('canvas');
      canvas.width = w * 2;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      const leftImg = myRole === 'left' ? myImg : theirImg;
      const rightImg = myRole === 'left' ? theirImg : myImg;
      ctx.drawImage(leftImg, 0, 0, w, h);
      ctx.drawImage(rightImg, w, 0, w, h);
      // PNG instead of JPEG so thumbnails stay sharp
      resolve(canvas.toDataURL('image/png'));
    }
    myImg.onload = onLoad;
    theirImg.onload = onLoad;
    myImg.src = myDataUrl;
    theirImg.src = theirDataUrl;
  });
}

  function showStrip() {
    boothControls.style.display = 'none';
    stripEditor.style.display = 'block';
    loadGallery();
    renderStrip();
  }

  function goToBooth() {
    ws.send(JSON.stringify({ type: 'restart_session' }));
    resetSessionState();
  }

  function resetSessionState() {
    photos = [null, null, null, null];
    remotePhotos = [null, null, null, null];
    mergedPhotos = [null, null, null, null];
    currentSlot = 0;
    sessionDriver = false;
    for (let i = 0; i < 4; i++) clearSlot(i);
    updateSlotHighlight();

    captionInput.value = '';
    borderColor = '#f0e9ff';
    document.querySelectorAll('.color-swatch').forEach((s, i) => s.classList.toggle('selected', i === 0));

    stripEditor.style.display = 'none';
    boothControls.style.display = 'block';
    startBtn.style.display = 'block';
    startBtn.disabled = false;
    startBtn.textContent = 'Start photo session';
    saveStatus.textContent = '';
  }

async function renderStrip() {
  const SCALE = 2; // render at 2x then display at 1x for sharpness
  const W = 560 * SCALE, BORDER = 26 * SCALE, ROW_GAP = 8 * SCALE;
  const frameW = (W - BORDER * 2) / 2;
  const frameH = frameW * 1.28;
  const captionH = 70 * SCALE;
  const H = BORDER + (frameH + ROW_GAP) * 4 - ROW_GAP + BORDER + captionH;

  stripCanvas.width = W;
  stripCanvas.height = H;
  stripCanvas.style.width = '100%'; // display at CSS width, render at 2x
  const ctx = stripCanvas.getContext('2d');

  ctx.fillStyle = borderColor;
  ctx.fillRect(0, 0, W, H);

  const loadImage = (src) => new Promise(res => {
    const img = new Image();
    img.onload = () => res(img);
    img.src = src;
  });

  const leftSrcs = myRole === 'left' ? photos : remotePhotos;
  const rightSrcs = myRole === 'left' ? remotePhotos : photos;

  if (leftSrcs.some(s => !s) || rightSrcs.some(s => !s)) return;

  const leftImgs = await Promise.all(leftSrcs.map(loadImage));
  const rightImgs = await Promise.all(rightSrcs.map(loadImage));

  for (let i = 0; i < 4; i++) {
    const y = BORDER + i * (frameH + ROW_GAP);

    ctx.save();
    ctx.beginPath();
    ctx.rect(BORDER, y, frameW, frameH);
    ctx.clip();
    ctx.drawImage(leftImgs[i], BORDER, y, frameW, frameH);
    ctx.restore();

    ctx.save();
    ctx.beginPath();
    ctx.rect(BORDER + frameW, y, frameW, frameH);
    ctx.clip();
    ctx.drawImage(rightImgs[i], BORDER + frameW, y, frameW, frameH);
    ctx.restore();
  }

  await document.fonts.load(`${32 * SCALE}px 'Caveat'`);
  const caption = captionInput.value || '';
  if (caption) {
    ctx.fillStyle = borderColor === '#3a2e4d' ? '#ffffff' : '#3a2e4d';
    ctx.font = `700 ${32 * SCALE}px 'Caveat', cursive`;
    ctx.textAlign = 'center';
    ctx.fillText(caption, W / 2, H - BORDER + 8 * SCALE);
  }

  ctx.fillStyle = borderColor === '#3a2e4d' ? 'rgba(255,255,255,0.5)' : 'rgba(58,46,77,0.4)';
  ctx.font = `600 ${12 * SCALE}px Quicksand, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(new Date().toLocaleDateString(), W / 2, H - 10 * SCALE);
}

  captionInput.addEventListener('input', () => {
    renderStrip();
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'strip_update', field: 'caption', value: captionInput.value }));
    }
  });

  document.getElementById('color-pickers').addEventListener('click', (e) => {
    const swatch = e.target.closest('.color-swatch');
    if (!swatch) return;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    swatch.classList.add('selected');
    borderColor = swatch.dataset.color;
    renderStrip();
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'strip_update', field: 'color', value: borderColor }));
    }
  });

  document.getElementById('download-btn').addEventListener('click', () => {
    const a = document.createElement('a');
    a.download = `our-photobooth-${Date.now()}.png`;
    a.href = stripCanvas.toDataURL('image/png');
    a.click();
  });

  document.getElementById('save-gallery-btn').addEventListener('click', () => {
    saveStatus.textContent = 'Saving...';
    fetch(`${HTTP_URL}/strips`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dataUrl: stripCanvas.toDataURL('image/png') })
    })
      .then(r => r.json())
      .then(() => {
        saveStatus.textContent = 'Saved to your gallery ✓';
        loadGallery();
      })
      .catch(() => { saveStatus.textContent = 'Could not save. Try again.'; });
  });

  document.getElementById('restart-btn').addEventListener('click', goToBooth);
</script>
</body>
</html>
